<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0908" />

    <!-- SEO básico: título e descrição padrão. Cada página ajusta esses valores
         dinamicamente através do componente <SEO />, em src/components/SEO.jsx -->
    <title>Gabriel Maiolli de Oliveira - Desenvolvedor Fullstack</title>
    <meta
      name="description"
      content="Portfólio de Gabriel Maiolli de Oliveira, Desenvolvedor Fullstack. Artigo científico publicado na SODEBRAS e contato."
    />
    <meta name="author" content="Gabriel Maiolli de Oliveira" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / redes sociais -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gabriel Maiolli de Oliveira - Desenvolvedor Fullstack" />
    <meta
      property="og:description"
      content="Portfólio pessoal com artigo científico publicado na SODEBRAS e experiência em IA e automação."
    />
    <meta property="og:locale" content="pt_BR" />

    <!-- Fontes: Space Grotesk (títulos), Inter (corpo de texto), JetBrains Mono (detalhes/código) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>
  <body class="bg-bg text-ink font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
